# 数据采集器配置文件

# ===========================================
# 数据源选择
# ===========================================
# 可选值：simulator, api, scraper
# - simulator: 模拟器（开发测试用，无需 API key）
# - api: 真实 API（需要申请 API key）
# - scraper: 网页爬虫（需要注意 robots.txt 和法律风险）
collector_type: simulator

# ===========================================
# API 配置（当 collector_type=api 时使用）
# ===========================================
api:
  # 推荐新手使用 Football-Data.org（免费 10 次/分钟）
  # 注册地址：https://www.football-data.org/client/register.php
  provider: football_data_org
  api_key: "YOUR_API_KEY_HERE"  # 替换为你的 API key
  rate_limit: 10  # 每秒请求数限制
  leagues:
    - Premier League
    - La Liga
    - Serie A
    - Bundesliga
    - Ligue 1
  
  # 其他 API 提供商选项：
  # 1. API-Football (https://api-football.com/)
  #    - 免费版：100 次/天
  #    - 付费版：$19/月起
  # provider: api_football
  # api_key: "YOUR_API_FOOTBALL_KEY"
  
  # 2. SportMonks (https://www.sportmonks.com/)
  #    - 付费服务，$9/月起
  #    - 数据最全面，更新最快
  # provider: sportmonks
  # api_key: "YOUR_SPORTMONKS_KEY"

# ===========================================
# 网页爬虫配置（当 collector_type=scraper 时使用）
# ===========================================
scraper:
  # ⚠️ 警告：网页爬虫可能违反网站服务条款
  # 仅用于个人学习和研究，请勿用于商业用途
  target_site: flashscore
  base_url: https://www.flashscore.com
  request_delay: 3  # 请求间隔（秒），避免被封 IP
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  
  # 其他可爬取网站（需自行实现解析逻辑）：
  # - 7M 体育：http://www.7m.cn/
  # - 雷速体育：https://www.leisu.com/
  # - 懂球帝：https://www.dongqiudi.com/

# ===========================================
# 模拟器配置（当 collector_type=simulator 时使用）
# ===========================================
simulator:
  # 自定义球队实力参数
  # attack: 进攻强度（期望进球数/90 分钟）
  # defense: 防守强度（失球数/90 分钟，越低越好）
  teams:
    Manchester City:
      attack: 2.3
      defense: 0.8
    Liverpool:
      attack: 2.1
      defense: 0.9
    Arsenal:
      attack: 2.0
      defense: 1.0
    Real Madrid:
      attack: 2.2
      defense: 0.9
    Barcelona:
      attack: 2.0
      defense: 1.1
    Bayern Munich:
      attack: 2.4
      defense: 0.8
    PSG:
      attack: 2.1
      defense: 1.0
    Inter Milan:
      attack: 1.8
      defense: 1.0
    AC Milan:
      attack: 1.7
      defense: 1.1
    Juventus:
      attack: 1.6
      defense: 1.0
    Atletico Madrid:
      attack: 1.5
      defense: 0.9
    Borussia Dortmund:
      attack: 1.9
      defense: 1.2
    Chelsea:
      attack: 1.7
      defense: 1.1
    Manchester United:
      attack: 1.6
      defense: 1.2
    Tottenham:
      attack: 1.8
      defense: 1.3
    Napoli:
      attack: 1.9
      defense: 1.0
    AS Roma:
      attack: 1.6
      defense: 1.2
    Lazio:
      attack: 1.5
      defense: 1.2
    Sevilla:
      attack: 1.4
      defense: 1.2
    Valencia:
      attack: 1.3
      defense: 1.3

# ===========================================
# 数据存储配置
# ===========================================
storage:
  # 数据保存路径
  data_dir: ./data/raw
  # 是否保存原始数据
  save_raw: true
  # 是否保存处理后的数据
  save_processed: true
  # 数据保留天数
  retention_days: 30

# ===========================================
# 日志配置
# ===========================================
logging:
  level: INFO
  file: ./logs/collector.log
  max_size_mb: 10
  backup_count: 5

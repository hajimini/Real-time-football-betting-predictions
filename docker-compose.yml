version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: football_db
    environment:
      POSTGRES_USER: football_user
      POSTGRES_PASSWORD: football_password
      POSTGRES_DB: football_betting
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - football_network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: football_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - football_network

  # InfluxDB 时序数据库
  influxdb:
    image: influxdb:2.7
    container_name: football_influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin_password
      DOCKER_INFLUXDB_INIT_ORG: football
      DOCKER_INFLUXDB_INIT_BUCKET: match_data
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - football_network

  # API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football_api
    command: python -m scripts.run_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://football_user:football_password@postgres:5432/football_betting
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app/src
      - ./data/models:/app/data/models
    networks:
      - football_network

  # Dashboard 服务
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football_dashboard
    command: streamlit run scripts/run_dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - football_network

networks:
  football_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  influxdb_data:
